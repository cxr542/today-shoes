<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오늘뭐신지 — 하단 탭 UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Malgun Gothic", sans-serif; background: #d1d5db; padding: 24px; }
    h1 { text-align: center; font-size: 20px; margin-bottom: 8px; }
    p.sub { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    .row { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .phone { width: 320px; background: #f0f2f5; border-radius: 28px; overflow: hidden; border: 8px solid #111827; box-shadow: 0 20px 50px rgba(0,0,0,.12); }
    .label { text-align: center; font-size: 12px; font-weight: 700; color: #4b5563; margin: 8px 0 4px; }
    .safe { min-height: 580px; display: flex; flex-direction: column; position: relative; }
    .scroll { flex: 1; padding-bottom: 58px; overflow: hidden; }
    .logo-today { font-size: 22px; font-weight: 900; color: #ea580c; }
    .logo-shoes { font-size: 22px; font-weight: 900; }
    .pad { padding: 16px 20px 8px; }
    .page-title { font-size: 22px; font-weight: 900; }
    .page-sub { margin-top: 6px; font-size: 13px; color: #6b7280; }
    .dash { display: flex; gap: 10px; padding: 0 16px 12px; }
    .dash-card { flex: 1; background: #fff; border-radius: 14px; padding: 14px; border: 1px solid #f3f4f6; font-size: 12px; }
    .dash-val { font-size: 18px; font-weight: 900; color: #ea580c; margin-top: 4px; }
    .grid { padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { background: #fff; border-radius: 14px; overflow: hidden; border: 1px solid #f3f4f6; }
    .thumb { aspect-ratio: 4/3; background: #d1d5db; }
    .card-label { padding: 10px 12px; font-size: 13px; font-weight: 800; }
    .tabs { position: absolute; bottom: 0; left: 0; right: 0; display: flex; background: #fff; border-top: 1px solid #e5e7eb; padding: 6px 0 10px; align-items: flex-end; }
    .tab { flex: 1; text-align: center; font-size: 9px; font-weight: 700; color: #9ca3af; min-width: 0; }
    .tab.on { color: #ea580c; }
    .tab-icon { font-size: 16px; display: block; }
    .tab-add { flex: 1; display: flex; justify-content: center; margin-top: -18px; }
    .fab { width: 44px; height: 44px; border-radius: 22px; background: #ea580c; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 3px solid #fff; }
  </style>
</head>
<body>
  <h1>오늘뭐신지 — 하단 탭 5개</h1>
  <p class="sub">홈 · 신발장 · 추가(➕) · 가이드 · 링크 — 기능별 전용 화면</p>
  <div class="row">
    <div>
      <p class="label">홈 탭</p>
      <div class="phone"><div class="safe"><div class="scroll">
        <div class="pad"><span class="logo-today">오늘</span><span class="logo-shoes">뭐신지</span><p class="page-sub">오늘 달릴 때 어울리는 러닝화</p></div>
        <div class="dash">
          <div class="dash-card">👟 신발장<div class="dash-val">3켤레</div></div>
          <div class="dash-card" style="background:#f0fdf4">✨ AI<div class="dash-val" style="font-size:13px;color:#15803d">2/3</div></div>
        </div>
      </div><div class="tabs">
        <div class="tab on"><span class="tab-icon">🏠</span>홈</div>
        <div class="tab"><span class="tab-icon">👟</span>신발장</div>
        <div class="tab-add"><div class="fab">➕</div></div>
        <div class="tab"><span class="tab-icon">📖</span>가이드</div>
        <div class="tab"><span class="tab-icon">🔗</span>링크</div>
      </div></div></div>
    </div>
    <div>
      <p class="label">신발장 · 사진 등록</p>
      <div class="phone"><div class="safe"><div class="scroll">
        <div class="pad"><div class="page-title">신발장</div><p class="page-sub">촬영/선택 → 확인 → 자동 저장</p></div>
        <div style="margin:0 16px 10px;padding:12px;background:#fff;border-radius:14px;font-size:11px;color:#6b7280">① 촬영/선택 → ② 등록 확인 → ③ 자동 저장</div>
        <div style="display:flex;gap:8px;padding:0 16px 12px"><div style="flex:1;background:#ea580c;color:#fff;border-radius:14px;padding:12px;text-align:center;font-size:12px;font-weight:800">📸 촬영</div><div style="flex:1;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px;text-align:center;font-size:12px;font-weight:800">🖼️ 앨범</div></div>
        <div class="grid">
          <div class="card"><div class="thumb"></div><div class="card-label">나이키 페가수스</div></div>
          <div class="card"><div class="thumb"></div><div class="card-label">호카 클리프톤</div></div>
        </div>
      </div><div class="tabs">
        <div class="tab"><span class="tab-icon">🏠</span>홈</div>
        <div class="tab on"><span class="tab-icon">👟</span>신발장</div>
        <div class="tab-add"><div class="fab">➕</div></div>
        <div class="tab"><span class="tab-icon">📖</span>가이드</div>
        <div class="tab"><span class="tab-icon">🔗</span>링크</div>
      </div></div></div>
    </div>
  </div>
</body>
</html>
